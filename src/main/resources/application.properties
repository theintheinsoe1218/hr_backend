spring.application.name=hr-backend

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hr_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Security Configuration
# IMPORTANT: Change this secret key to a secure random string for production
application.security.jwt.secret-key=MzY0NTY3ODlBQkNERUZHSElKS0xNTlBQUVJTVFVWV1hZWmtpMGQxZTJmM2E0YjVjNmQ3ZThmOWEwYjFjMmQzZTRmNWE2YjcwODk=
application.security.jwt.expiration=86400000

# Server Port
server.port=8085
